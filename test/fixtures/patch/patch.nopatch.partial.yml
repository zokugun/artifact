action:
  command: update



/target/.artifactrc.yml: |
  artifacts:
    artifact-awesome-config:
      version: 0.1.0
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/target/.github/workflows/ci-master.yml: |
  name: "CI - Master: Build, Test & Lint"

  on:
    push:
      branches:
        - master
      paths-ignore:
        - "**/*.md"

  permissions: {}

  jobs:
    check:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            fetch-depth: 0
            persist-credentials: false

        - name: Install zizmor
          run: |
            pipx install zizmor

        - name: Setup Node.js environment
          uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
          with:
            node-version-file: .nvmrc
            package-manager-cache: false

        - name: Install dependencies
          run: |
            npm ci

        - name: Build
          run: |
            npm run build

        - name: Lint code
          run: |
            npm run lint:all

        - name: Lint commit
          run: |
            if [[ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]]; then
              npx commitlint --to HEAD --verbose
            else
              npx commitlint --from "${BASE_SHA}" --to "${HEAD_SHA}" --verbose
            fi
          env:
            BASE_SHA: ${{ github.event.before }}
            HEAD_SHA: ${{ github.event.head_commit.id }}



