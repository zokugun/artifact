action:
  command: update



/target/.artifactrc.yml: |
  artifacts:
    artifact-awesome-config:
      version: 0.1.0
/target/default.json: |
  {
    "foo": "bar",
    "qux": [
      1,
      2,
      3
    ],
    "baz": {
      "foo": 1,
      "bar": 2
    }
  }
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/#default.json.json-patch: |
  [
    {
      "op": "test",
      "path": "/foo",
      "value": "bar"
    },
    {
      "op": "replace",
      "path": "/baz",
      "value": [
        "foo",
        "bar"
      ]
    },
    {
      "op": "add",
      "path": "/qux/-",
      "value": 9
    }
  ]



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.11.0/schemas/v3/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/#default.json.json-patch:
  error: "ENOENT: no such file or directory"
/merged/default.json: |
  {
    "foo": "bar",
    "qux": [
      1,
      2,
      3,
      9
    ],
    "baz": [
      "foo",
      "bar"
    ]
  }
