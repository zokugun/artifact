action:
  command: add
  arguments:
    - - awesome-config



/target/.editorconfig: |
  root = true

  [*]
  indent_style = tab
  tab_width = 4
  end_of_line = lf
  charset = utf-8
  trim_trailing_whitespace = true
  insert_final_newline = true
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/configs/default.json: |
  {
    "foo": "bar",
    "qux": [
      1,
      2,
      3
    ]
  }
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/.editorconfig: |
  root = true

  [*]
  indent_style = tab
  tab_width = 4
  end_of_line = lf
  charset = utf-8
  trim_trailing_whitespace = true
  insert_final_newline = true
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/default.json: |
  {
  	"foo": "bar",
  	"qux": [
  		1,
  		2,
  		3
  	]
  }
