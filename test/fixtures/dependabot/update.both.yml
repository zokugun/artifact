action:
  command: update



/target/.artifactrc.yml: |
  artifacts:
    artifact-awesome-config:
      version: 0.1.0
    artifact-awesome-config-bis:
      version: 0.1.0
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/target/.github/dependabot.yml: |
  version: 2
  updates:
    # Maintain dependencies for GitHub Actions
    - package-ecosystem: github-actions
      directory: /
      schedule:
        interval: weekly
      cooldown:
        default-days: 7
      labels:
        - T-maintenance
        - A-ci



/registry/artifact-awesome-config/.artifactrc.yml: |
  upsert:
    .github/**/*.yml:
      if_exists: overwrite
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/.github/dependabot.yml: |
  version: 2
  updates:
    # Maintain dependencies for GitHub Actions
    - package-ecosystem: github-actions
      directory: /
      schedule:
        interval: weekly
      cooldown:
        default-days: 7

