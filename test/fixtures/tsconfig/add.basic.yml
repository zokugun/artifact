action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/incoming/configs/tsconfig.json: |
  {
    "compilerOptions": {
      /* Basic Options */
      "outDir": ".",
      "rootDir": ".",
      "composite": true,
  
      /* Module Resolution Options */
      "resolveJsonModule": true,
    },
    "files": [
      "package.json",
    ],
  }
/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/tsconfig.json: |
  {
    "compilerOptions": {
      /* Basic Options */
      "outDir": ".",
      "rootDir": ".",
      "composite": true,
  
      /* Module Resolution Options */
      "resolveJsonModule": true,
    },
    "files": [
      "package.json",
    ],
  }
