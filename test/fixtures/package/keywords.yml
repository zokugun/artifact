action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0",
    "keywords": [
      "foo",
      "bar"
    ]
  }



/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/package.json: |
  {
    "keywords": [
      "foo",
      "qux"
    ]
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0",
    "keywords": [
      "foo",
      "bar",
      "qux"
    ]
  }
