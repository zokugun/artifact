action:
  command: update



/target/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
  artifacts:
    artifact-awesome-config:
      version: 0.1.0
      update:
        src/*:
          if_exists: skip
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/src/index.ts: |
  export function hello(firstname: string, lastname: string): string {
    return `Hello ${firstname} ${lastname}!`;
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
      update:
        src/*:
          if_exists: skip
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/src/index.ts: |
  export function hello(firstname: string, lastname: string): string {
    return `Hello ${firstname} ${lastname}!`;
  }
