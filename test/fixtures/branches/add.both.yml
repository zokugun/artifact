action:
  command: add
  arguments:
    - - awesome-config



/target/.artifactrc.yml: |
  artifacts:
    artifact-lang-js:
      version: 1.0.0
      requires:
        - "14"



/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/branches/[lang-js]/configs/.editorconfig: |
  root = true

  [*]
  indent_style = space
  tab_width = 2
  end_of_line = lf
  charset = utf-8
  trim_trailing_whitespace = true
  insert_final_newline = true
/registry/artifact-awesome-config/branches/[lang-js:14]/configs/.nvmrc: |
  v14.21.3
/registry/artifact-awesome-config/branches/[lang-js:20]/configs/.nvmrc: |
  v20.18.3



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
  artifacts:
    artifact-lang-js:
      version: 1.0.0
      requires:
        - "14"
    artifact-awesome-config:
      version: 1.0.0
/merged/.nvmrc: |
  v14.21.3
/merged/.editorconfig: |
  root = true

  [*]
  indent_style = space
  tab_width = 2
  end_of_line = lf
  charset = utf-8
  trim_trailing_whitespace = true
  insert_final_newline = true
