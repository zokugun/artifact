action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/.artifactrc.yml: |
  variables:
    ISSUE_ID: 1
/registry/artifact-awesome-config/configs/.github/ISSUE_TEMPLATE/preapproved.yml: |
  name: Pre-Discussed and Approved Topics
  body:
    - type: markdown
      attributes:
        value: |-
          Please prefer GitHub Discussions. See: https://github.com//issues/#[[vars.ISSUE_ID]]



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/.github/ISSUE_TEMPLATE/preapproved.yml: |
  name: Pre-Discussed and Approved Topics
  body:
    - type: markdown
      attributes:
        value: |-
          Please prefer GitHub Discussions. See: https://github.com//issues/1
