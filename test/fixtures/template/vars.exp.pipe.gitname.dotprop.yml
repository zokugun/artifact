action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0",
    "repository": {
      "type": "git",
      "url": "git+https://github.com/me-an-owner/my-awesome-project.git"
    }
  }



/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/.artifactrc.yml: |
  variables:
    REPOSITORY_NAME: =package.json.repository.url |> toGitUrl |> _.name
    REPOSITORY_OWNER: =package.json.repository.url |> toGitUrl |> _.owner
/registry/artifact-awesome-config/configs/package.json: |
  {
    "homepage": "https://github.com/#[[vars.REPOSITORY_OWNER]]/#[[vars.REPOSITORY_NAME]]"
  }



/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0",
    "repository": {
      "type": "git",
      "url": "git+https://github.com/me-an-owner/my-awesome-project.git"
    },
    "homepage": "https://github.com/me-an-owner/my-awesome-project"
  }
/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.9.0/schemas/v2/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
