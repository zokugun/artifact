action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/package.json: |
  {
    "bin": {
      "#[[package.json.name]]": "bin/#[[package.json.name]]"
    }
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.11.0/schemas/v3/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0",
    "bin": {
      "my-awesome-project": "bin/my-awesome-project"
    }
  }
