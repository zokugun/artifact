action:
  command: update



/target/.artifactrc: |
  artifacts:
    - name: awesome-config
      version: 0.1.0
/target/package.json: |
  {
    "name": "test",
    "version": "0.1.0",
    "devDependencies": {
      "@types/node": "^14.17.16",
      "typescript": "^4.2.4",
      "xo": "^0.43.0"
    },
    "scripts": {
      "lint": "xo"
    },
    "keywords": [
      "test"
    ]
  }



/incoming/.artifactrc: |
  update:
    package.json:
      filter:
        - main
        - scripts
        - devDependencies
/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }
/incoming/configs/package.json: |
  {
    "main": "./lib/index.js",
    "scripts": {
      "bundle": "ncc build out/extension --out lib",
      "compile": "tsc -p src",
      "release": "release-it",
      "vscode:prepublish": "npm run compile && npm run bundle",
      "watch": "tsc-watch -p src --onSuccess 'npm run bundle'"
    },
    "devDependencies": {
      "@types/vscode": "^1.23.0",
      "@vercel/ncc": "^0.29.0",
      "release-it": "^14.11.3",
      "tsc-watch": "^4.4.0"
    },
    "activationEvents": [
      "*"
    ],
    "keywords": [
      "ignore"
    ]
  }



/merged/.artifactrc: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "test",
    "version": "0.1.0",
    "devDependencies": {
      "@types/node": "^14.17.16",
      "@types/vscode": "^1.23.0",
      "@vercel/ncc": "^0.29.0",
      "release-it": "^14.11.3",
      "tsc-watch": "^4.4.0",
      "typescript": "^4.2.4",
      "xo": "^0.43.0"
    },
    "scripts": {
      "bundle": "ncc build out/extension --out lib",
      "compile": "tsc -p src",
      "lint": "xo",
      "release": "release-it",
      "vscode:prepublish": "npm run compile && npm run bundle",
      "watch": "tsc-watch -p src --onSuccess 'npm run bundle'"
    },
    "keywords": [
      "test"
    ],
    "main": "./lib/index.js",
    "activationEvents": [
      "*"
    ]
  }
