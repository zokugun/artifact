action:
  command: update



/target/.artifactrc: |
  artifacts:
    - name: artifact-awesome-config
      version: 0.1.0
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/.artifactrc: |
  update:
    workflows/check-pr.yml:
      rename: workflows/ci-pr.yml
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/workflows/ci-pr.yml: |
  hello: Hello world!



/merged/.artifactrc: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.11.0/schemas/v3/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/workflows/ci-pr.yml: |
  hello: Hello world!
