action:
  command: update



/target/.artifactrc: |
  artifacts:
    - name: awesome-config
      version: 0.1.0
/target/.gitignore: |
  node_modules
  out
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }
/incoming/configs/gitignore: |
  node_modules
  lib



/merged/.artifactrc: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/.gitignore: |
  node_modules
  out
  lib
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
