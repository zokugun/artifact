action:
  command: add
  arguments:
    - - awesome-config



/target/.editorconfig: |
  root = true
  
  [*]
  indent_style = space
  tab_width = 2
  end_of_line = lf
  charset = utf-8
  trim_trailing_whitespace = true
  insert_final_newline = true
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/incoming/configs/.editorconfig: |
  root = true
  
  [*]
  indent_style = tab
  tab_width = 4
  end_of_line = lf
  charset = utf-8
  trim_trailing_whitespace = true
  insert_final_newline = true
  
  [{*.yml,*.yaml}]
  indent_style = space
  indent_size = 2
/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/.editorconfig: |
  root = true
  
  [*]
  indent_style = tab
  tab_width = 4
  end_of_line = lf
  charset = utf-8
  trim_trailing_whitespace = true
  insert_final_newline = true
  
  [{*.yml,*.yaml}]
  indent_style = space
  indent_size = 2
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
