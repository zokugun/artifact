action:
  command: add
  arguments:
    - - awesome-config



/target/.vscodeignore: |
  node_modules
  out
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/incoming/configs/.vscodeignore: |
  node_modules
  lib
/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/.vscodeignore: |
  node_modules
  out
  lib
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
