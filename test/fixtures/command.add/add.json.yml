action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/target/.artifactrc.json: |
  {
    "artifacts": [
      {
        "name": "awesome-base",
        "version": "1.0.0"
      }
    ]
  }



/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }



/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/.artifactrc.json: |
  {
    "$schema": "https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json",
    "artifacts": {
      "awesome-base": {
        "version": "1.0.0"
      },
      "awesome-config": {
        "version": "1.0.0"
      }
    }
  }
