action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/target/src/index.ts: |
  export function hello(name: string): string {
    return `Hello ${name}!`;
  }



/incoming/.artifactrc: |
  install:
    src/*:
      remove: true
/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }



/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/src/index.ts:
  error: "ENOENT: no such file or directory"
