action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/target/workflows/check-pr.yml: |
  hello: Hello!
  name: Joe White



/registry/artifact-awesome-config/.artifactrc: |
  install:
    workflows/check-pr.yml:
      rename: workflows/ci-pr.yml
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/workflows/ci-pr.yml: |
  hello: Hello world!



/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.9.0/schemas/v2/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/workflows/ci-pr.yml: |
  hello: Hello world!
  name: Joe White
