action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/incoming/.artifactrc: |
  install:
    src/*:
      remove: true
/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }



/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/src/index.ts:
  error: "ENOENT: no such file or directory"
