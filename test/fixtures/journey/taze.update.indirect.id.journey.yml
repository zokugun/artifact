action:
  command: update



/target/.artifactrc.yml: |
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
    artifact-awesome-config-bis:
      version: 0.1.0
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/target/.tazerc.json: |
  {
    "force": true,
    "includeLocked": true,
    "maturityPeriod": 7,
    "packageMode": {
      "typescript": "minor"
    }
  }



/registry/artifact-awesome-config-bis/package.json: |
  {
    "name": "artifact-awesome-config-bis",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config-bis/configs/.tazerc.json: |
  {
    "exclude": [
      "xo"
    ],
    "packageMode": {
      "@types/node": "minor"
    }
  }



/registry/artifact-awesome-config/.artifactrc.yml: |
  journeys:
    - name: taze
      scope: global
      travels:
        - path: .tazerc.json
      route:
        map(sort):
          map(compose):
            $$default:
              fork:
                array: list(concat)
                object:
                  - map(sort)
                  - map(concat)
                default: primitive
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/.tazerc.json: |
  {
    "packageMode": {
      "typescript": "minor"
    }
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
    artifact-awesome-config-bis:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/.tazerc.json: |
  {
    "exclude": [
      "xo"
    ],
    "force": true,
    "includeLocked": true,
    "maturityPeriod": 7,
    "packageMode": {
      "@types/node": "minor",
      "typescript": "minor"
    }
  }
