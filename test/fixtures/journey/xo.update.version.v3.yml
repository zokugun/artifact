action:
  command: update



/target/.artifactrc: |
  artifacts:
    - name: artifact-awesome-config
      version: 0.1.0
/target/.xo-config.json: |
  {
    "plugins": [
      "chai"
    ],
    "rules": {
      "capitalized-comments": "on",
      "complexity": "off",
      "max-depth": [
        "error",
        2
      ]
    }
  }
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/.artifactrc: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.11.0/schemas/v3/package.json
  journeys:
    - name: xo
      travels:
        - path: .xo-config.json
      route:
        map(sort):
          map(compose):
            ignores: list(concat)
            overrides: list(concat)
            plugins: list(concat)
            rules:
              - map(sort)
              - map(concat)
            $$default: overwrite
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/.xo-config.json: |
  {
    "plugins": [
      "chai-friendly"
    ],
    "rules": {
      "capitalized-comments": "off",
      "max-depth": [
        "error",
        8
      ],
      "no-await-in-loop": "off"
    }
  }



/merged/.artifactrc: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.12.0/schemas/v4/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/.xo-config.json: |
  {
    "plugins": [
      "chai",
      "chai-friendly"
    ],
    "rules": {
      "capitalized-comments": "off",
      "complexity": "off",
      "max-depth": [
        "error",
        8
      ],
      "no-await-in-loop": "off"
    }
  }
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
