action:
  command: add
  arguments:
    - - awesome-config



/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/target/.tazerc.json: |
  {
    "force": true,
    "includeLocked": true,
    "maturityPeriod": 7,
    "packageMode": {
      "typescript": "minor"
    }
  }



/registry/artifact-awesome-config/.artifactrc.yml: |
  journeys:
    - name: taze
      travels:
        - path: .tazerc.json
      route:
        mapSort:
          compose:
            $$default:
              fork:
                array: listConcat
                object:
                  - mapConcat
                  - mapSort
                default: primitive
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/.tazerc.json: |
  {
    "exclude": [
      "xo"
    ],
    "packageMode": {
      "@types/node": "minor"
    }
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.9.0/schemas/v2/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/.tazerc.json: |
  {
    "exclude": [
      "xo"
    ],
    "force": true,
    "includeLocked": true,
    "maturityPeriod": 7,
    "packageMode": {
      "@types/node": "minor",
      "typescript": "minor"
    }
  }
