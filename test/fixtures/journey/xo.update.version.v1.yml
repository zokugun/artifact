action:
  command: update



/target/.artifactrc: |
  artifacts:
    - name: artifact-awesome-config
      version: 0.1.0
/target/.xo-config.json: |
  {
    "plugins": [
      "chai"
    ],
    "rules": {
      "capitalized-comments": "on",
      "complexity": "off",
      "max-depth": [
        "error",
        2
      ]
    }
  }
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/.artifactrc: |
  update:
    .xo-config.json:
      route:
        json:
          compose:
            rules: mapConcat
            $$default: overwrite
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/.xo-config.json: |
  {
    "plugins": [
      "chai-friendly"
    ],
    "rules": {
      "capitalized-comments": "off",
      "max-depth": [
        "error",
        8
      ],
      "no-await-in-loop": "off"
    }
  }



/merged/.artifactrc: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.9.0/schemas/v2/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/.xo-config.json: |
  {
    "plugins": [
      "chai-friendly"
    ],
    "rules": {
      "capitalized-comments": "off",
      "complexity": "off",
      "max-depth": [
        "error",
        8
      ],
      "no-await-in-loop": "off"
    }
  }
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
