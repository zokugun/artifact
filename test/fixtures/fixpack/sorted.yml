action:
  command: add
  arguments:
    - - awesome-config



/target/.fixpackrc: |
  sortToTop:
    - name
    - displayName
    - description
    - version
    - homepage
    - repository



/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }
/incoming/configs/.fixpackrc: |
  required:
    - dependencies
  sortToTop:
    - name
    - displayName
    - description
    - version
  finalNewLine: true



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/.fixpackrc: |
  finalNewLine: true
  required:
    - dependencies
  sortToTop:
    - name
    - displayName
    - description
    - version
    - homepage
    - repository
