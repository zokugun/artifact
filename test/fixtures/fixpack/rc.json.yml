action:
  command: add
  arguments:
    - - awesome-config



/target/.fixpackrc: |
  {
    "sortToTop": [
      "name",
      "displayName",
      "description",
      "version"
    ]
  }



/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }
/incoming/configs/.fixpackrc: |
  {
    "sortToTop": [
      "scripts",
      "dependencies",
      "devDependencies",
      "optionalDependencies"
    ]
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/.fixpackrc: |
  {
    "sortToTop": [
      "name",
      "displayName",
      "description",
      "version",
      "scripts",
      "dependencies",
      "devDependencies",
      "optionalDependencies"
    ]
  }
