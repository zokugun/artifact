action:
  command: add
  arguments:
    - - awesome-config



/target/.fixpackrc: |
  sortToTop:
    - name
    - displayName



/registry/artifact-awesome-config/.artifactrc: |
  journeys:
    - name: fixpack
      travels:
        - path: .fixpackrc
          format:
            - json
            - yaml
      route:
        map(sort):
          map(compose):
            $$default:
              fork:
                array: list(concat)
                object:
                  - map(sort)
                  - map(concat)
                default: primitive
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/.fixpackrc: |
  sortToTop:
    - description
    - version



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.11.0/schemas/v3/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/.fixpackrc: |
  sortToTop:
    - name
    - displayName
    - description
    - version
