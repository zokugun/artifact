action:
  command: add
  arguments:
    - - awesome-config



/target/.fixpackrc: |
  sortToTop:
    - name
    - displayName
    - description
    - version
    - homepage
    - repository



/registry/artifact-awesome-config/.artifactrc: |
  journeys:
    - name: fixpack
      travels:
        - path: .fixpackrc
          format: yaml
      route:
        mapSort:
          compose:
            sortToTop: listConcatAfter
            $$default:
              fork:
                array: listConcat
                object:
                  - mapConcat
                  - mapSort
                default: primitive
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/configs/.fixpackrc: |
  sortToTop:
    - name
    - displayName
    - description
    - version
    - private
    - author
    - publisher
    - license
    - homepage
    - repository



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.9.0/schemas/v2/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/merged/.fixpackrc: |
  sortToTop:
    - name
    - displayName
    - description
    - version
    - private
    - author
    - publisher
    - license
    - homepage
    - repository
