action:
  command: remove
  arguments:
    - - awesome-config



/target/.artifactrc: |
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/target/src/index2.ts: |
  export function hello(name: string): string {
    return `Hello ${name}!`;
  }



/registry/artifact-awesome-config/.artifactrc: |
  uninstall:
    src/index.ts:
      remove: true
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }



/merged/.artifactrc: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.9.0/schemas/v2/install.json
  artifacts: {}
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/src/index2.ts: |
  export function hello(name: string): string {
    return `Hello ${name}!`;
  }
/merged/src/index.ts:
  error: "ENOENT: no such file or directory"
