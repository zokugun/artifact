action:
  command: update


/target/.artifactrc.yml: |
  artifacts:
    - name: awesome-config
      version: 0.1.0
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/incoming/.artifactrc.yml: |
  upsert:
    src/*:
      if_exists: overwrite
/incoming/package.json: |
  {
    "name": "awesome-config",
    "version": "1.0.0"
  }
/incoming/configs/src/index.ts: |
  export function hello(firstname: string, lastname: string): string {
    return `Hello ${firstname} ${lastname}!`;
  }



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/install.json
  artifacts:
    awesome-config:
      version: 1.0.0
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
/merged/src/index.ts: |
  export function hello(firstname: string, lastname: string): string {
    return `Hello ${firstname} ${lastname}!`;
  }
