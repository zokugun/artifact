action:
  command: update



/target/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.11.0/schemas/v3/install.json
  artifacts:
    artifact-awesome-config:
      version: 0.1.0
      requires:
        - "20"
/target/.czrc: |
/target/.nvmrc: |
  v20.0.0
/target/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }



/registry/artifact-awesome-config/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/package.json

  variants:
    root: 14
/registry/artifact-awesome-config/package.json: |
  {
    "name": "artifact-awesome-config",
    "version": "1.0.0"
  }
/registry/artifact-awesome-config/variants/14/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.6.0/schemas/v1/package.json

  always:
    .czrc:
      if_exists: remove
/registry/artifact-awesome-config/variants/14/configs/.nvmrc: |
  v14.21.3
/registry/artifact-awesome-config/variants/20/configs/.nvmrc: |
  v20.20.2



/merged/.artifactrc.yml: |
  $schema: https://raw.githubusercontent.com/zokugun/artifact/v0.11.0/schemas/v3/install.json
  artifacts:
    artifact-awesome-config:
      version: 1.0.0
      requires:
        - "20"
/merged/.nvmrc: |
  v20.20.2
/merged/package.json: |
  {
    "name": "my-awesome-project",
    "version": "1.0.0"
  }
